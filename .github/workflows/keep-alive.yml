name: Keep Render alive

on:
  schedule:
    # Runs every 14 minutes — Render free spins down after 15 min of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            https://open-wallet-standard.onrender.com/healthz) || STATUS="timeout"
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "App is alive"
          elif [ "$STATUS" = "timeout" ]; then
            echo "Request timed out — Render may still be waking up (this is normal)"
          else
            echo "Warning: app returned $STATUS"
          fi
